services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trello
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trello}
      POSTGRES_DB: trello
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trello"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://trello:${POSTGRES_PASSWORD:-trello}@postgres:5432/trello?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:8080}
      SEED_ADMIN: ${SEED_ADMIN:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        API_PUBLIC_URL: http://localhost:8080
        WS_PUBLIC_URL: ws://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_PUBLIC_URL: http://localhost:8080
      WS_PUBLIC_URL: ws://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
