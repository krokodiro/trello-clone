openapi: 3.0.3
info:
  title: Trello Clone API
  description: |
    REST API for the Trello Clone app.

    **Authentication:** Most endpoints require `Authorization: Bearer <access_token>`.
    Workspace/board endpoints also require a verified email.

    **WebSockets** (not covered by this spec):
    - `GET /ws?board_id={uuid}&token={access_token}` — board updates
    - `GET /ws/notifications?token={access_token}` — user notifications
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://trello-api-8oul.onrender.com/api/v1
    description: Production (Render)

tags:
  - name: Auth
    description: Registration, login, email verification, password reset
  - name: Workspaces
    description: Workspaces, members, invitations
  - name: Boards
    description: Boards, lists, tasks, comments, assignees
  - name: Notifications
    description: In-app notifications

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Email not verified

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Generic success (may include verification_url when email is off)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationEmailResponse"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Generic success (may include reset_url when email is off)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetEmailResponse"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      tags: [Workspaces]
      summary: Create workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Workspaces]
      summary: Get workspace
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      summary: Update workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      tags: [Workspaces]
      summary: Delete workspace (owner only)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /workspaces/{id}/members:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Workspaces]
      summary: List members
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"

  /workspaces/{id}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Workspaces]
      summary: Update member role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "204":
          description: Updated
    delete:
      tags: [Workspaces]
      summary: Remove member
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed

  /workspaces/{id}/invitations:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    post:
      tags: [Workspaces]
      summary: Invite user by email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  $ref: "#/components/schemas/WorkspaceRole"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"

  /invitations/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Workspaces]
      summary: Accept workspace invitation
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}/boards:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Boards]
      summary: List boards
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Board"
    post:
      tags: [Boards]
      summary: Create board
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /boards/{id}:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Boards]
      summary: Get board with lists and tasks
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardDetail"
    patch:
      tags: [Boards]
      summary: Update board
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
    delete:
      tags: [Boards]
      summary: Delete board
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /boards/{id}/lists:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    post:
      tags: [Boards]
      summary: Create list
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"

  /lists/reorder:
    patch:
      tags: [Boards]
      summary: Reorder lists on a board
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [board_id, list_ids]
              properties:
                board_id:
                  type: string
                  format: uuid
                list_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "204":
          description: Reordered

  /lists/{id}:
    parameters:
      - $ref: "#/components/parameters/ListId"
    patch:
      tags: [Boards]
      summary: Update list
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"
    delete:
      tags: [Boards]
      summary: Delete list
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /lists/{id}/tasks:
    parameters:
      - $ref: "#/components/parameters/ListId"
    post:
      tags: [Boards]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  maxLength: 500
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Boards]
      summary: Get task
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      tags: [Boards]
      summary: Update task
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                due_date:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      tags: [Boards]
      summary: Delete task
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /tasks/{id}/move:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    patch:
      tags: [Boards]
      summary: Move task to another list/position
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [list_id, position]
              properties:
                list_id:
                  type: string
                  format: uuid
                position:
                  type: integer
                client_id:
                  type: string
                  description: Optional WebSocket client id to ignore echo
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/comments:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Boards]
      summary: Add comment
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /tasks/{id}/assignees/{userId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [Boards]
      summary: Assign user to task
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Assigned
    delete:
      tags: [Boards]
      summary: Remove assignee
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed

  /comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Boards]
      summary: Update comment
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
    delete:
      tags: [Boards]
      summary: Delete comment
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Unread notification count
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/{id}/read:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Notifications]
      summary: Mark notification read
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Marked read

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications read
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Marked all read

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkspaceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BoardId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ListId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"

    RegisterResponse:
      allOf:
        - $ref: "#/components/schemas/AuthResponse"
        - type: object
          properties:
            verification_sent:
              type: boolean
            email_verified:
              type: boolean
            verification_url:
              type: string
              description: Present when email was not sent (dev / no mailer)

    VerificationEmailResponse:
      type: object
      properties:
        message:
          type: string
        verification_url:
          type: string

    PasswordResetEmailResponse:
      type: object
      properties:
        message:
          type: string
        reset_url:
          type: string

    WorkspaceRole:
      type: string
      enum: [owner, admin, member]

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceMember:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        joined_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        email:
          type: string
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        invited_by:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    InvitationResponse:
      type: object
      properties:
        invitation:
          $ref: "#/components/schemas/Invitation"
        invite_url:
          type: string

    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    List:
      type: object
      properties:
        id:
          type: string
          format: uuid
        board_id:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        list_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        position:
          type: integer
        due_date:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/User"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    BoardDetail:
      type: object
      properties:
        board:
          $ref: "#/components/schemas/Board"
        lists:
          type: array
          items:
            $ref: "#/components/schemas/List"

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
        link:
          type: string
        read:
          type: boolean
        created_at:
          type: string
          format: date-time
