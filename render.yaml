# One-click deploy on Render (free tier).
# After first deploy, set the 3 env vars listed in DEPLOY.md.

databases:
  - name: trello-db
    plan: free
    databaseName: trello
    user: trello

services:
  - type: keyvalue
    name: trello-redis
    plan: free
    ipAllowList: []

  - type: web
    name: trello-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trello-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_URL
        value: https://trello-web-o15c.onrender.com
      - key: SEED_ADMIN
        value: "true"
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: Admin
      # Email on Render — use Resend HTTP API (SMTP ports are blocked)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: trello-web
    runtime: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: API_PUBLIC_URL
        value: https://trello-api-8oul.onrender.com
      - key: WS_PUBLIC_URL
        value: wss://trello-api-8oul.onrender.com
