# One-click deploy on Render (free tier).
# 1. Push this repo to GitHub
# 2. Open https://dashboard.render.com/blueprint/new
# 3. Connect the repo — Render creates all services below
# 4. After deploy, open trello-api → Environment and set WEB_URL to your trello-web URL (e.g. https://trello-web-xxxx.onrender.com)

databases:
  - name: trello-db
    plan: free
    databaseName: trello
    user: trello

services:
  - type: keyvalue
    name: trello-redis
    plan: free
    ipAllowList: []

  - type: web
    name: trello-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trello-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_URL
        sync: false
      - key: SEED_ADMIN
        value: "true"
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: Admin

  - type: web
    name: trello-web
    runtime: docker
    rootDir: frontend
    plan: free
    envVars:
      # Use Render private network service name (not hostport — that hostname can fail DNS).
      - key: API_URL
        value: http://trello-api:10000
      # Required for live board/notification updates — set to wss://YOUR-trello-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        sync: false
